version: '3.8'
services:
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: pot-provider
    restart: unless-stopped

  mischicat-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: mischicat-bot:latest
    container_name: mischicat-bot
    env_file:
      - .env
    volumes:
      - sqlite-data:/app/sqlite-data
    depends_on:
      - pot-provider
    restart: unless-stopped

  web-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: mischicat-web-dashboard:latest
    container_name: mischicat-web-dashboard
    env_file:
      - .env
    volumes:
      - sqlite-data:/app/sqlite-data
    ports:
      - "${WEB_PORT:-5000}:5000"
    restart: unless-stopped
    depends_on:
      - mischicat-bot

volumes:
  sqlite-data:
    driver: local
