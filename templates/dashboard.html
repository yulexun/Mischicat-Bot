<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙世界 - 玩家统计仪表板</title>
    <style>
        :root {
            --bg-dark: #111111;
            --bg-mid: #2a2a2a;
            --surface: #ffffff;
            --surface-alt: #f4f4f4;
            --border: #d9d9d9;
            --text-main: #1f1f1f;
            --text-muted: #666666;
            --accent: #222222;
            --accent-hover: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .stat-card h3 {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--accent);
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid var(--border);
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: var(--accent);
            color: white;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: var(--accent-hover);
        }

        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #1a1a1a 0%, #3a3a3a 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: var(--surface-alt);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge.alive {
            background: #ececec;
            color: #111111;
        }

        .badge.dead {
            background: #2b2b2b;
            color: #ffffff;
        }

        .badge.realm {
            background: #efefef;
            color: #222222;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .sort-icon {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            margin-left: 5px;
            opacity: 0.5;
        }

        .sort-icon.active {
            opacity: 1;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover {
            background: var(--accent);
            color: white;
        }

        .page-btn.active {
            background: var(--accent);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 800px;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 修仙世界 ✨</h1>
            <p>玩家统计仪表板</p>
            <p id="lastUpdate" style="font-size: 0.9em; margin-top: 10px;"></p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>总玩家数</h3>
                <div class="value" id="totalPlayers">-</div>
            </div>
            <div class="stat-card">
                <h3>健在玩家</h3>
                <div class="value" id="alivePlayers">-</div>
            </div>
            <div class="stat-card">
                <h3>已坐化</h3>
                <div class="value" id="deadPlayers">-</div>
            </div>
            <div class="stat-card">
                <h3>灵石总量</h3>
                <div class="value" id="totalStones">-</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索玩家名称、境界、宗门...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="alive">健在</button>
                <button class="filter-btn" data-filter="dead">已坐化</button>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">加载中...</div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="noData" class="no-data" style="display: none;">暂无数据</div>
            
            <table id="playersTable" style="display: none;">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')">姓名 <span class="sort-icon">▼</span></th>
                        <th onclick="sortTable('gender')">性别</th>
                        <th onclick="sortTable('realm')">境界 <span class="sort-icon">▼</span></th>
                        <th onclick="sortTable('cultivation')">修为 <span class="sort-icon">▼</span></th>
                        <th onclick="sortTable('spirit_stones')">灵石 <span class="sort-icon">▼</span></th>
                        <th onclick="sortTable('lifespan')">寿元 <span class="sort-icon">▼</span></th>
                        <th>灵根</th>
                        <th>宗门</th>
                        <th>修炼状态</th>
                        <th onclick="sortTable('cultivating_years')">闭关设定 <span class="sort-icon">▼</span></th>
                        <th onclick="sortTable('is_cultivating')">闭关剩余 <span class="sort-icon">▼</span></th>
                        <th>所在城市</th>
                        <th>状态</th>
                        <th onclick="sortTable('last_active')">最后活跃 <span class="sort-icon">▼</span></th>
                    </tr>
                </thead>
                <tbody id="playersBody">
                </tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let allPlayers = [];
        let filteredPlayers = [];
        let currentPage = 1;
        const itemsPerPage = 20;
        let currentFilter = 'all';
        let currentSort = { column: 'cultivation', ascending: false };

        async function loadData() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                document.getElementById('playersTable').style.display = 'none';
                document.getElementById('noData').style.display = 'none';

                // Load players
                const playersResponse = await fetch('/api/players');
                const playersData = await playersResponse.json();

                if (!playersData.success) {
                    throw new Error(playersData.error || '加载失败');
                }

                allPlayers = playersData.players;
                filteredPlayers = [...allPlayers];

                // Load stats
                const statsResponse = await fetch('/api/stats');
                const statsData = await statsResponse.json();

                if (statsData.success) {
                    document.getElementById('totalPlayers').textContent = statsData.stats.total_players;
                    document.getElementById('alivePlayers').textContent = statsData.stats.alive_players;
                    document.getElementById('deadPlayers').textContent = statsData.stats.dead_players;
                    document.getElementById('totalStones').textContent = statsData.stats.total_spirit_stones.toLocaleString();
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');

                applyFilters();
                renderTable();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '加载失败: ' + error.message;
            }
        }

        function applyFilters() {
            let result = [...allPlayers];

            // Apply status filter
            if (currentFilter === 'alive') {
                result = result.filter(p => p.is_dead === 0);
            } else if (currentFilter === 'dead') {
                result = result.filter(p => p.is_dead === 1);
            }

            // Apply search filter
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                result = result.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.realm.toLowerCase().includes(searchTerm) ||
                    (p.sect && p.sect.toLowerCase().includes(searchTerm)) ||
                    p.current_city.toLowerCase().includes(searchTerm)
                );
            }

            // Apply sorting
            result.sort((a, b) => {
                let aVal = a[currentSort.column];
                let bVal = b[currentSort.column];

                if (aVal === null || aVal === undefined) aVal = '';
                if (bVal === null || bVal === undefined) bVal = '';

                if (typeof aVal === 'string') {
                    return currentSort.ascending ? 
                        aVal.localeCompare(bVal) : 
                        bVal.localeCompare(aVal);
                } else {
                    return currentSort.ascending ? aVal - bVal : bVal - aVal;
                }
            });

            filteredPlayers = result;
            currentPage = 1;
        }

        function renderTable() {
            const tbody = document.getElementById('playersBody');
            tbody.innerHTML = '';

            if (filteredPlayers.length === 0) {
                document.getElementById('playersTable').style.display = 'none';
                document.getElementById('noData').style.display = 'block';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('playersTable').style.display = 'table';
            document.getElementById('noData').style.display = 'none';

            // Paginate
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredPlayers.slice(start, end);

            pageData.forEach(player => {
                const row = document.createElement('tr');
                
                const statusClass = player.is_dead === 0 ? 'alive' : 'dead';
                const statusText = player.is_dead === 0 ? '健在' : '已坐化';
                
                row.innerHTML = `
                    <td><strong>${player.name}</strong></td>
                    <td>${player.gender}修</td>
                    <td><span class="badge realm">${player.realm}</span></td>
                    <td>${player.cultivation.toLocaleString()}</td>
                    <td>${player.spirit_stones.toLocaleString()}</td>
                    <td>${player.lifespan} / ${player.lifespan_max}</td>
                    <td>${player.spirit_root}</td>
                    <td>${player.sect || '-'}</td>
                    <td>${player.cultivation_status || '-'}</td>
                    <td>${player.cultivating_years_display || '-'}</td>
                    <td>${player.retreat_remaining || '-'}</td>
                    <td>${player.current_city}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td>${player.last_active_formatted}</td>
                `;
                
                tbody.appendChild(row);
            });

            renderPagination();
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            const totalPages = Math.ceil(filteredPlayers.length / itemsPerPage);
            
            if (totalPages <= 1) return;

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '← 上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            };
            pagination.appendChild(prevBtn);

            // Page numbers
            const maxButtons = 7;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    renderTable();
                };
                pagination.appendChild(btn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = '下一页 →';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            };
            pagination.appendChild(nextBtn);
        }

        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort.column = column;
                currentSort.ascending = false;
            }
            
            applyFilters();
            renderTable();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => {
            applyFilters();
            renderTable();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                applyFilters();
                renderTable();
            });
        });

        // Initial load
        loadData();

        // Auto refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
